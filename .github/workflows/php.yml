name: PHPUnit

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'  # ← Changed from '8.3' to '8.4'
          extensions: xdebug
          coverage: xdebug    # ← Explicitly enable coverage driver

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Download PHPUnit PHAR
        run: |
          wget https://phar.phpunit.de/phpunit.phar  
          chmod +x phpunit.phar
          mv phpunit.phar /usr/local/bin/phpunit

      - name: Check PHPUnit version
        run: phpunit --version

      - name: Run PHPUnit tests with coverage
        run: |
          mkdir -p build/logs
          phpunit --configuration phpunit.xml --coverage-clover build/logs/clover.xml --debug
        env:
          XDEBUG_MODE: coverage

      - name: Send coverage to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: build/logs/clover.xml